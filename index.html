<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线本地WEB界面编辑器</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
        }
        #container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        #toolbar {
            background-color: #f0f0f0;
            padding: 10px;
            border-bottom: 1px solid #ccc;
            display: flex;
            gap: 10px;
        }
        #editor-container {
            flex: 1;
            overflow: hidden;
        }
        button {
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="toolbar">
            <button onclick="formatCode()">格式化代码</button>
            <button onclick="validateCode()">语法校验</button>
            <button onclick="saveFile()">保存文件</button>
        </div>
        <div id="editor-container"></div>
    </div>

    <!-- Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>
    <!-- Prettier 用于代码格式化 -->
    <script src="https://unpkg.com/prettier@2.8.8/standalone.js"></script>
    <script src="https://unpkg.com/prettier@2.8.8/parser-babel.js"></script>
    <!-- ESLint 用于语法校验 -->
    <script src="https://cdn.jsdelivr.net/npm/eslint@8.39.0/dist/eslint.min.js"></script>

    <script>
        // 加载Monaco Editor
        require.config({
            paths: {
                'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs'
            }
        });

        let editor;

        require(['vs/editor/editor.main'], function() {
            // 初始化编辑器
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: `function hello() {
    console.log("Hello, World!");
}

// 这是一个注释
const name = "Editor";
console.log("Hello, " + name);`,
                language: 'javascript',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: true },
                scrollBeyondLastLine: false
            });
        });

        // 格式化代码
        function formatCode() {
            const code = editor.getValue();
            try {
                const formattedCode = prettier.format(code, {
                    parser: 'babel',
                    semi: true,
                    singleQuote: true,
                    trailingComma: 'es5'
                });
                editor.setValue(formattedCode);
                alert('代码格式化成功！');
            } catch (error) {
                alert('格式化失败: ' + error.message);
            }
        }

        // 语法校验
        function validateCode() {
            const code = editor.getValue();
            try {
                // 简单的语法校验
                new Function(code);
                alert('语法校验通过！');
            } catch (error) {
                alert('语法错误: ' + error.message);
            }
        }

        // 保存文件
        function saveFile() {
            const code = editor.getValue();
            const blob = new Blob([code], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'script.js';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
